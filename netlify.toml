[build]
  command = "bun run build"
  publish = "dist/client"

# SPA fallback — necessário para que rotas client-side funcionem (ex: /resumo, /leads)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ⚠️ ATENÇÃO: este deploy é STATIC ONLY (sem backend).
#
# As funcionalidades abaixo NÃO vão funcionar na Netlify com esta config:
#   - Geração de Pix (server function)
#   - Salvar leads no banco
#   - Polling de status do pagamento
#   - Página /leads (download CSV)
#
# Para ter backend funcionando você precisa:
#   1. Rodar `bash scripts/export-netlify.sh` (substitui o vite.config.ts pelo
#      preset Netlify do TanStack Start — gera .output/server e .output/public)
#   2. Reupload do ZIP gerado em dist-export/projeto-netlify.zip
#   3. Trocar este netlify.toml por:
#         publish = ".output/public"
#         [functions]
#           directory = ".output/server"
#           node_bundler = "esbuild"
#   4. Configurar as variáveis de ambiente no painel da Netlify
#      (VITE_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, FYHUB_API_KEY, etc.)
#
# Se quiser tudo funcionando sem essa complexidade, publique pelo Lovable.
